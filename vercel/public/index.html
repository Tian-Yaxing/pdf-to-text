<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF 转 文本 (Vercel)</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #e4e8fb 0%, #faf4f8 100%);
        min-height: 100vh;
        display: flex; justify-content: center; align-items: center;
        padding: 20px;
      }
      .container {
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 800px;
        width: 100%;
        padding: 40px;
      }
      h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 28px; }
      .notice { text-align: center; color: #666; margin-bottom: 20px; font-size: 14px; }

      .options { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
      .option-group { display: flex; align-items: center; gap: 8px; }
      .option-group label { font-size: 14px; color: #666; }
      .option-group select, .option-group input[type="checkbox"] { padding: 5px 10px; border: 1px solid #ddd; border-radius: 4px; }

      .upload-area {
        border: 2px dashed #ccc;
        border-radius: 12px;
        padding: 40px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
        margin-bottom: 20px;
      }
      .upload-area:hover { border-color: #409eff; background: #f0f7ff; }
      .upload-area.dragover { border-color: #409eff; background: #e6f4ff; }
      .upload-area input { display: none; }

      .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: all 0.3s; }
      .btn-primary { background: #409eff; color: white; }
      .btn-primary:hover { background: #66b1ff; }
      .btn-primary:disabled { background: #ccc; cursor: not-allowed; }

      .result-area { margin-top: 20px; }
      .result-area textarea { width: 100%; height: 300px; border: 1px solid #ddd; border-radius: 8px; padding: 15px; font-size: 14px; resize: vertical; }

      .stats { display: flex; gap: 20px; margin-bottom: 15px; flex-wrap: wrap; }
      .stat-item { background: #f5f7fa; padding: 10px 15px; border-radius: 8px; font-size: 14px; }
      .stat-item strong { color: #409eff; }

      .loading { display: none; text-align: center; padding: 20px; }
      .loading.show { display: block; }
      .loading p { color: #666; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>PDF 转 文本</h1>
      <p class="notice">支持文本型 PDF，扫描版可使用 OCR（第三方 API）</p>

      <div class="options">
        <div class="option-group">
          <input type="checkbox" id="useOcr" />
          <label for="useOcr">启用 OCR（扫描版 PDF）</label>
        </div>
        <div class="option-group">
          <label>OCR 语言：</label>
          <select id="ocrLang">
            <option value="eng">英文</option>
            <option value="chseng">中文+英文</option>
            <option value="chs">简体中文</option>
          </select>
        </div>
      </div>

      <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept=".pdf" />
        <p>点击或拖拽上传 PDF 文件</p>
        <p id="fileName" style="color: #409eff; margin-top: 10px;"></p>
      </div>

      <button class="btn btn-primary" id="convertBtn" disabled>开始转换</button>

      <div class="loading" id="loading">
        <p>正在处理...</p>
      </div>

      <div class="result-area" id="resultArea" style="display:none;">
        <div class="stats">
          <div class="stat-item">页数: <strong id="pageCount">0</strong></div>
          <div class="stat-item" id="ocrStatus" style="display:none;">OCR: <strong>已启用</strong></div>
        </div>
        <textarea id="resultText" placeholder="转换结果"></textarea>
      </div>
    </div>

    <script>
      const uploadArea = document.getElementById('uploadArea');
      const fileInput = document.getElementById('fileInput');
      const fileName = document.getElementById('fileName');
      const convertBtn = document.getElementById('convertBtn');
      const useOcr = document.getElementById('useOcr');
      const ocrLang = document.getElementById('ocrLang');
      const loading = document.getElementById('loading');
      const resultArea = document.getElementById('resultArea');
      const resultText = document.getElementById('resultText');
      const pageCount = document.getElementById('pageCount');
      const ocrStatus = document.getElementById('ocrStatus');

      let selectedFile = null;

      uploadArea.addEventListener('click', () => fileInput.click());
      uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
      });
      uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
      uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
      });

      fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) handleFile(e.target.files[0]);
      });

      function handleFile(file) {
        if (!file.name.endsWith('.pdf')) {
          alert('请选择 PDF 文件');
          return;
        }
        selectedFile = file;
        fileName.textContent = file.name;
        convertBtn.disabled = false;
      }

      convertBtn.addEventListener('click', async () => {
        if (!selectedFile) return;

        loading.classList.add('show');
        resultArea.style.display = 'none';
        convertBtn.disabled = true;

        try {
          const formData = new FormData();
          formData.append('pdf', selectedFile);

          let url = '/api/convert';
          if (useOcr.checked) {
            url += `?ocr=true&lang=${ocrLang.value}`;
          }

          const response = await fetch(url, {
            method: 'POST',
            body: formData
          });

          const data = await response.json();

          if (data.success) {
            pageCount.textContent = data.pages;
            ocrStatus.style.display = data.metadata?.ocrUsed ? 'block' : 'none';
            resultText.value = data.text;
            resultArea.style.display = 'block';
          } else {
            alert('转换失败: ' + data.error);
          }
        } catch (err) {
          alert('请求失败: ' + err.message);
        } finally {
          loading.classList.remove('show');
          convertBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
